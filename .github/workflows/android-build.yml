name: Build Mobile Apps (APK & iOS)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Mobile

    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./Mobile/package-lock.json

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📱 Build APK
        run: eas build --platform android --profile preview --non-interactive --clear-cache

      - name: 🍎 Build iOS
        run: eas build --platform ios --profile preview --non-interactive --clear-cache